name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Stack test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.2"
          enable-stack: true

      - name: Run tests
        working-directory: programa
        run: stack --no-terminal test
